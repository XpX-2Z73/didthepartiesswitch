name: Dependabot Auto-Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Wait for checks to pass
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;

            // Poll until all checks complete (max ~10 min)
            for (let i = 0; i < 30; i++) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner, repo, ref: sha
              });
              const runs = checks.check_runs.filter(r => r.name !== 'auto-merge');
              const pending = runs.filter(r => r.status !== 'completed');
              if (pending.length === 0) {
                const failed = runs.filter(r => !['success', 'neutral', 'skipped'].includes(r.conclusion));
                if (failed.length > 0) {
                  core.setFailed(`Checks failed: ${failed.map(r => r.name).join(', ')}`);
                  return;
                }
                break;
              }
              await new Promise(r => setTimeout(r, 20000));
            }

            await github.rest.pulls.merge({
              owner, repo,
              pull_number: pr,
              merge_method: 'merge'
            });
